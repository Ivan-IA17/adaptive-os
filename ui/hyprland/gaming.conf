# Hyprland config — GAMING profile
# Single fullscreen workspace, no borders, no gaps, max performance

source = ~/.config/hypr/common.conf

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    layout = dwindle
}

decoration {
    rounding = 0
    blur { enabled = false }
    drop_shadow = false
}

animations {
    enabled = false  # disable all animations for max FPS
}

# Fullscreen workspace
workspace = 1, name:game, monitor:main, fullscreen

# Games go fullscreen automatically
windowrulev2 = fullscreen,  class:^(steam_app_.*)$
windowrulev2 = fullscreen,  class:^(Minecraft.*)$
windowrulev2 = fullscreen,  class:^(factorio)$

# Disable compositor for games (tear-free via GPU driver instead)
windowrulev2 = immediate,   class:^(steam_app_.*)$

# No notifications during gaming
exec-once = dunstctl set-paused true

exec-once = waybar -c ~/.config/waybar/gaming.jsonc
exec-once = hyprpaper -c ~/.config/hypr/wallpaper-gaming.conf
