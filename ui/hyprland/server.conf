# Hyprland config — SERVER profile
# Minimal, focused on system monitoring and SSH

source = ~/.config/hypr/common.conf

# ── General ──────────────────────────────────────────────
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 1
    col.active_border = rgba(00897Bff)
    col.inactive_border = rgba(263238aa)
    layout = dwindle
}

# ── Decoration ────────────────────────────────────────────
decoration {
    rounding = 4
    blur { enabled = false }
    drop_shadow = false
}

# ── Animations (subtle) ───────────────────────────────────────────
animations {
    enabled = true
    bezier = serverBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 3, serverBezier
    animation = fade,    1, 3, default
    animation = workspaces, 1, 4, default
}

# ── Window rules ─────────────────────────────────────────
windowrulev2 = opacity 0.9, class:^(htop)$
windowrulev2 = opacity 0.9, class:^(btop)$

# ── Wallpaper ─────────────────────────────────────────────
exec-once = hyprpaper -c ~/.config/hypr/wallpaper-server.conf

# ── Waybar ────────────────────────────────────────────────
exec-once = waybar -c ~/.config/waybar/server.jsonc