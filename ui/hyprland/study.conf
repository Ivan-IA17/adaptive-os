# Hyprland config — STUDY profile
# Single focused window, warm tones, minimal distractions

source = ~/.config/hypr/common.conf

general {
    gaps_in = 8
    gaps_out = 24
    border_size = 2
    col.active_border = rgba(059669ff)
    col.inactive_border = rgba(1E293B55)
    layout = master
}

decoration {
    rounding = 12
    blur { enabled = true; size = 4; passes = 2; }
    drop_shadow = false
    dim_inactive = true
    dim_strength = 0.15
}

animations {
    enabled = true
    bezier = studyBezier, 0.25, 0.46, 0.45, 0.94
    animation = windows,    1, 6, studyBezier
    animation = fade,       1, 8, studyBezier
    animation = workspaces, 1, 8, studyBezier, fade
}

master {
    new_is_master = true
    mfact = 0.65   # Main window gets 65% of screen
}

# Study apps — reading & notes in main master slot
windowrulev2 = workspace 1, class:^(org.pwmt.zathura)$
windowrulev2 = workspace 1, class:^(evince)$
windowrulev2 = workspace 1, class:^(okular)$
windowrulev2 = workspace 2, class:^(obsidian)$
windowrulev2 = workspace 2, class:^(Anki)$
windowrulev2 = workspace 3, class:^(firefox)$

workspace = 1, name:reading, monitor:main
workspace = 2, name:notes,   monitor:main
workspace = 3, name:web,     monitor:main

exec-once = hyprpaper -c ~/.config/hypr/wallpaper-study.conf
exec-once = waybar -c ~/.config/waybar/study.jsonc

# Warm colour temperature for long reading sessions
exec-once = pkill wlsunset; wlsunset -t 4500 -T 6500 -l 37.3 -L -5.9

# Pomodoro timer
exec-once = gnome-pomodoro --no-default-window

# Block distracting notifications
exec-once = dunst -config ~/.config/dunst/study.conf
