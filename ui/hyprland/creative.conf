# Hyprland config — CREATIVE profile
# Floating layout, large single workspace, colour-accurate display

source = ~/.config/hypr/common.conf

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(7C3AEDff) rgba(DB2777ff) 45deg
    col.inactive_border = rgba(1E293Baa)
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 6
        passes = 3
        vibrancy = 0.1696
    }
    drop_shadow = true
    shadow_range = 12
    shadow_render_power = 3
    col.shadow = rgba(7C3AED55)
}

animations {
    enabled = true
    bezier = creativeBezier, 0.16, 1, 0.3, 1
    animation = windows,    1, 5, creativeBezier, popin 80%
    animation = fade,       1, 5, creativeBezier
    animation = workspaces, 1, 6, creativeBezier, slidevert
    animation = layers,     1, 4, creativeBezier, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

# Creative apps float by default for flexible canvas arrangement
windowrulev2 = float, class:^(krita)$
windowrulev2 = float, class:^(inkscape)$
windowrulev2 = float, class:^(gimp)$
windowrulev2 = size 1400 900, class:^(krita)$
windowrulev2 = center,        class:^(krita)$

# Blender always maximised
windowrulev2 = maximize, class:^(Blender)$

# OBS: picture-in-picture on workspace 2
windowrulev2 = workspace 2, class:^(com.obsproject.Studio)$

# Colour management: disable compositor for colour-critical apps
windowrulev2 = noanim, class:^(darktable)$

workspace = 1, name:canvas,  monitor:main
workspace = 2, name:preview, monitor:main
workspace = 3, name:files,   monitor:main

exec-once = hyprpaper -c ~/.config/hypr/wallpaper-creative.conf
exec-once = waybar -c ~/.config/waybar/creative.jsonc
exec-once = dunstctl set-paused false
# Warm colour temperature off for colour accuracy
exec-once = pkill wlsunset; true
