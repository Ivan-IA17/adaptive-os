# Hyprland config — WORK profile
# Tiling layout, minimal distractions, dark focused theme

source = ~/.config/hypr/common.conf

# ── General ──────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(1565C0ff)
    col.inactive_border = rgba(1E293Baa)
    layout = master
}

# ── Decoration ────────────────────────────────────────────
decoration {
    rounding = 6
    blur { enabled = true; size = 3; passes = 2 }
    drop_shadow = false
}

# ── Animations (minimal for focus) ───────────────────────
animations {
    enabled = true
    bezier = workBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 4, workBezier
    animation = fade,    1, 4, default
    animation = workspaces, 1, 5, default
}

# ── Layout: Master-Stack 2 columns ───────────────────────
master {
    new_is_master = false
    mfact = 0.55
}

# ── Workspaces ────────────────────────────────────────────
workspace = 1, name:code,    monitor:main
workspace = 2, name:browser, monitor:main
workspace = 3, name:terminal,monitor:main
workspace = 4, name:comms,   monitor:main

# ── Window rules ─────────────────────────────────────────
windowrulev2 = workspace 1, class:^(code)$
windowrulev2 = workspace 1, class:^(nvim)$
windowrulev2 = workspace 2, class:^(firefox)$
windowrulev2 = workspace 2, class:^(chromium)$
windowrulev2 = workspace 3, class:^(Alacritty)$
windowrulev2 = workspace 3, class:^(kitty)$
windowrulev2 = workspace 4, class:^(Slack)$
windowrulev2 = workspace 4, class:^(discord)$

# ── Wallpaper ─────────────────────────────────────────────
exec-once = hyprpaper -c ~/.config/hypr/wallpaper-work.conf

# ── Waybar ────────────────────────────────────────────────
exec-once = waybar -c ~/.config/waybar/work.jsonc

# ── Notifications ─────────────────────────────────────────
exec-once = dunst -config ~/.config/dunst/work.conf
