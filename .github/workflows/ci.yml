name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip & build tools
        run: pip install --upgrade pip setuptools wheel

      - name: Install dev dependencies
        run: pip install -e "orchestrator/[dev]"

      - name: Ruff lint
        run: ruff check orchestrator/adaptive_os/

      - name: Ruff format check
        run: ruff format --check orchestrator/adaptive_os/

      - name: Mypy type check
        run: mypy orchestrator/adaptive_os/ --ignore-missing-imports

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip & build tools
        run: pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pip install -e "orchestrator/[dev]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --cov=adaptive_os \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --timeout=30

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          flags: unittests

  validate-nix:
    name: Validate Nix flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check flake syntax
        run: nix flake check --no-build nix/
        continue-on-error: true

      - name: Show flake outputs
        run: nix flake show nix/
        continue-on-error: true

  docs:
    name: Check documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all links in docs
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress 'docs/**/*.md' 'README.md'
          fail: false
